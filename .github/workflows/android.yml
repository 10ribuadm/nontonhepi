name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_OUTPUT

    - name: Commit and Push APK
      run: |
        mkdir -p "builds/${{ steps.date.outputs.date }}"
        cp app/build/outputs/apk/debug/app-debug.apk "builds/${{ steps.date.outputs.date }}/nontonhepi-${{ steps.date.outputs.date }}.apk"
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add builds/
        git commit -m "Auto-upload APK: ${{ steps.date.outputs.date }} [skip ci]"
        git push

    - name: Upload to Appetize.io
      if: env.APPETIZE_TOKEN != ''
      env:
        APPETIZE_TOKEN: ${{ secrets.APPETIZE_API_TOKEN }}
      run: |
        RESPONSE=$(curl https://$APPETIZE_TOKEN@api.appetize.io/v1/apps \
          -F "file=@app/build/outputs/apk/debug/app-debug.apk" \
          -F "platform=android")
        
        PUBLIC_URL=$(echo $RESPONSE | jq -r '.appURL')
        echo "### 🚀 Emulator Browser Ready!" >> $GITHUB_STEP_SUMMARY
        echo "Cek aplikasi Anda di sini: $PUBLIC_URL" >> $GITHUB_STEP_SUMMARY
        echo "Link ini akan aktif selama sesi Appetize Anda tersedia." >> $GITHUB_STEP_SUMMARY

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
