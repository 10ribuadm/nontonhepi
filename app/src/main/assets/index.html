<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NontonHepi Lokal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #6200ee; --accent: #03dac6; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        .video-wrapper { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .play-icon { position: absolute; font-size: 5rem; opacity: 0; transition: 0.3s; }
        .show { opacity: 0.8; transform: scale(1.2); }
        .ui-overlay { position: absolute; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%); }
        .btn-claim { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--accent); color: #000; border: none; padding: 20px 40px; border-radius: 50px; font-weight: 800; display: none; z-index: 10; }
    </style>
</head>
<body>
    <div class="video-wrapper" onclick="togglePlay()">
        <video id="mainVideo" playsinline>
            <source id="videoSource" src="" type="video/mp4">
        </video>
        <i id="playIcon" class="fas fa-play play-icon"></i>
        <div class="ui-overlay">
            <h3 id="videoTitle">Video Lokal Keren</h3>
            <p>Poin Anda: <span id="pts-val">0</span></p>
        </div>
        <button id="claimBtn" class="btn-claim" onclick="claimReward()">KLAIM POIN</button>
    </div>

    <script>
        const playlist = [
            { file: "video1", title: "Video Offline Pertama" },
            { file: "video2", title: "Video Offline Kedua" }
        ];

        let currentIdx = 0;
        const video = document.getElementById('mainVideo');
        const playIcon = document.getElementById('playIcon');
        const claimBtn = document.getElementById('claimBtn');

        function loadVideo(index) {
            currentIdx = index;
            const data = playlist[index];
            // Ini adalah cara memanggil video dari dalam aplikasi Android
            document.getElementById('videoSource').src = `file:///android_res/raw/${data.file}`;
            document.getElementById('videoTitle').innerText = data.title;
            claimBtn.style.display = 'none';
            video.load();
            video.play();
        }

        function togglePlay() {
            if (video.paused) {
                video.play();
                playIcon.classList.remove('show', 'fa-pause');
                playIcon.classList.add('fa-play');
                setTimeout(() => playIcon.classList.remove('show'), 500);
            } else {
                video.pause();
                playIcon.classList.add('show', 'fa-pause');
                playIcon.classList.remove('fa-play');
            }
        }

        video.onended = () => { claimBtn.style.display = 'block'; };

        function claimReward() {
            alert("Poin berhasil diklaim (simulasi)!");
            let next = (currentIdx + 1) % playlist.length;
            loadVideo(next);
        }

        // Mulai video pertama
        loadVideo(0);
    </script>
</body>
</html>
